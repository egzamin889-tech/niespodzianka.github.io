<!DOCTYPE html>

<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dla Radka ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#ff9ecf,#ffd6ea);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.card{
    background:white;
    width:90%;
    max-width:600px;
    padding:40px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.15);
}

.page{
    display:none;
}

.page.active{
    display:block;
}

h1{
    margin-bottom:25px;
}

p{
    margin-bottom:15px;
}

input,
select,
textarea{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #ddd;
    margin-bottom:15px;
    font-size:16px;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
    margin:10px;
}

.yes{
    background:#ff4d8d;
    color:white;
}

.no{
    background:#e0e0e0;
    transition:all 0.3s ease;
}

.next{
    background:#ff4d8d;
    color:white;
}

#status{
    margin-top:20px;
    font-size:18px;
    font-weight:bold;
}

.heart{
    position:fixed;
    font-size:20px;
    animation:fall linear forwards;
    pointer-events:none;
}

@keyframes fall{
    from{
        transform:translateY(-100px);
    }
    to{
        transform:translateY(110vh);
    }
}

#adminBtn{
    position:fixed;
    bottom:10px;
    right:10px;
    font-size:18px;
    opacity:0.2;
    cursor:pointer;
    transition:0.3s;
}

#adminBtn:hover{
    opacity:1;
}
    
</style>

</head>
<body>

<div class="card">

```
<div id="page1" class="page active">
    <h1>❤️ Pójdziesz ze mną na randkę? ❤️</h1>

    <button class="yes" onclick="showPage(2)">
        TAK ❤️
    </button>

    <button class="no" id="noBtn">
        NIE
    </button>
</div>

<div id="page2" class="page">
    <h1>📅 Kiedy masz wolny czas?</h1>

    <input type="date" id="data" required>

    <input type="time" id="godzina" required>

    <button class="next" onclick="showPage(3)">
        Dalej ➜
    </button>
</div>

<div id="page3" class="page">
    <h1>🎉 Co chciałbyś robić?</h1>

    <select id="aktywnosc">
        <option>Kino 🎬</option>
        <option>Spacer 🌳</option>
        <option>Restauracja 🍝</option>
        <option>Wieczór filmowy 🍿</option>
        <option>Planszówki 🎲</option>
        <option>Coś spontanicznego ✨</option>
    </select>

    <textarea
        id="opis"
        rows="5"
        placeholder="Masz własny pomysł? ❤️"
    ></textarea>

    <button class="next" onclick="saveDate()">
        Wyślij ❤️
    </button>
</div>

<div id="page4" class="page">
    <h1>💖 Dziękuję 💖</h1>

    <p>
        Już nie mogę się doczekać naszej randki ❤️
    </p>

    <div id="status"></div>
</div>
```
<div id="adminBtn" onclick="showDates()">❤️</div>

<div id="datesList"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl = "https://nfelpizldqrxmhcwsuzf.supabase.co";
const supabaseKey = "sb_publishable_zez1euNvus8MRGOdlb6wCw_1aEdG7Fm";

const client = supabase.createClient(
    supabaseUrl,
    supabaseKey
);

function showPage(page){

    document
        .querySelectorAll(".page")
        .forEach(el => el.classList.remove("active"));

    document
        .getElementById("page" + page)
        .classList.add("active");
}

const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseenter", () => {

    noBtn.style.position = "fixed";

    const x =
        Math.random() *
        (window.innerWidth - 150);

    const y =
        Math.random() *
        (window.innerHeight - 70);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});

async function saveDate(){

    showPage(4);

    const status =
        document.getElementById("status");

    status.innerHTML = "⏳ Zapisywanie...";

    const { error } = await client
        .from("randki")
        .insert([
            {
                data_randki:
                    document.getElementById("data").value,

                godzina:
                    document.getElementById("godzina").value,

                aktywnosc:
                    document.getElementById("aktywnosc").value,

                opis:
                    document.getElementById("opis").value
            }
        ]);

    if(error){

        console.error(error);

        status.innerHTML =
            "❌ Błąd: " + error.message;

        return;
    }

    status.innerHTML =
        "✅ Wszystko zapisane ❤️";
}

setInterval(() => {

    const heart =
        document.createElement("div");

    heart.className = "heart";
    heart.innerHTML = "❤️";

    heart.style.left =
        Math.random() * 100 + "vw";

    heart.style.animationDuration =
        (Math.random() * 4 + 3) + "s";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 7000);

}, 500);

async function showDates(){

    const container =
        document.getElementById("datesList");

    container.innerHTML =
        "Ładowanie...";

    const { data, error } =
        await client
            .from("randki")
            .select("*")
            .order("id", { ascending: false });

    if(error){
        container.innerHTML =
            "❌ " + error.message;
        return;
    }

    let html = "";

    data.forEach(randka => {

        html += `
            <div style="
                background:white;
                margin:10px;
                padding:10px;
                border-radius:10px;
            ">
                <b>📅 ${randka.data_randki}</b><br>
                🕒 ${randka.godzina}<br>
                🎉 ${randka.aktywnosc}<br>
                💬 ${randka.opis || "-"}
            </div>
        `;
    });

    container.innerHTML = html;
}

</script>

</body>
</html>
